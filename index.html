<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Cost Calculators · AI Tokenomics</title>
<meta name="description" content="Three free AI cost calculators from the AI Tokenomics videos: the true cost of a demo at production scale, the routing spread, and margin per customer." />
<meta property="og:title" content="AI Cost Calculators · AI Tokenomics" />
<meta property="og:description" content="Tokens are the new cloud bill. Three calculators, one per video: true cost, routing, margin." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<style>
  :root{
    --cobalt:#2F5BEA; --cobalt-deep:#1E40C8; --paper:#FBFCFE; --surface:#FFFFFF;
    --ink:#131C30; --muted:#5B6680; --border:#E6EAF2;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  .bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 18px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:5}
  .brand{font-weight:800;font-size:17px;margin-right:10px;white-space:nowrap}
  .brand .ai{color:var(--cobalt)}
  .tab{font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);background:transparent;
    border:1.5px solid transparent;border-radius:999px;padding:8px 15px;cursor:pointer;transition:all .12s}
  .tab:hover{color:var(--ink)}
  .tab.on{color:#fff;background:var(--cobalt);border-color:var(--cobalt)}
  .tab small{display:block;font-weight:500;font-size:10.5px;opacity:.75}
  iframe.pane{flex:1;width:100%;border:0;display:none}
  iframe.pane.on{display:block}
</style>
</head>
<body>
  <nav class="bar">
    <div class="brand"><span class="ai">AI</span> Tokenomics · Calculators</div>
    <button class="tab on" data-p="truecost">True Cost<small>your $2 demo, at scale</small></button>
    <button class="tab" data-p="routing">Routing<small>the 40-85% lever</small></button>
    <button class="tab" data-p="margin">Margin<small>cost per customer</small></button>
  </nav>
  <iframe class="pane on" id="p-truecost" src="truecost.html" title="True Cost Calculator"></iframe>
  <iframe class="pane" id="p-routing" data-src="routing.html" title="Routing Calculator"></iframe>
  <iframe class="pane" id="p-margin" data-src="margin.html" title="Margin Calculator"></iframe>
<script>
  const tabs=document.querySelectorAll(".tab");
  function show(p){
    tabs.forEach(t=>t.classList.toggle("on",t.dataset.p===p));
    document.querySelectorAll(".pane").forEach(f=>{
      const on=f.id==="p-"+p;
      f.classList.toggle("on",on);
      if(on&&!f.src&&f.dataset.src)f.src=f.dataset.src;   // lazy-load
    });
    if(location.hash!=="#"+p)history.replaceState(null,"","#"+p);
  }
  tabs.forEach(t=>t.addEventListener("click",()=>show(t.dataset.p)));
  const h=location.hash.slice(1);
  if(["truecost","routing","margin"].includes(h))show(h);
</script>
</body>
</html>
